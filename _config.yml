title: My Site
home_title: "Welcome!"
home_tagline: "Discover my latest articles and more."
default_image: https://loremflickr.com/800/450/clouds,sky?lock=3
default_banner: ""
description: >-
  A short description of your site, used for SEO meta tags.
url: "https://yourdomain.com"
baseurl: ""
lang: en

sass:
  style: compressed

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge

permalink: /articles/:title/

plugins:
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-paginate

paginate: 6
paginate_path: "/page:num/"

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - .claude
  - .vscode
  - node_modules
  - vendor
  - Templates

collections:
  series:
    output: true
    permalink: /series/:path/
  series_drafts:
    output: true
    permalink: /series/:path/

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "series"
    values:
      layout: "series"
  - scope:
      path: ""
      type: "series_drafts"
    values:
      layout: "series"
