# Language skills.
# Two ways to represent a flag:
#   - flag_emoji: a country-flag emoji like "🇫🇷" (recommended — zero asset)
#   - flag: a path to an image in assets/ (used as fallback if flag_emoji is absent)
# url and link_text are optional (e.g. for a language certification).

- name: "English"
  flag_emoji: "🇬🇧"
  level: "Native"

- name: "French"
  flag_emoji: "🇫🇷"
  level: "Fluent (C1)"
  url: "https://optional-certification-url.com"
  link_text: "View certification"

- name: "Spanish"
  flag_emoji: "🇪🇸"
  level: "Conversational (B1)"

- name: "Japanese"
  flag_emoji: "🇯🇵"
  level: "Beginner (A2)"
