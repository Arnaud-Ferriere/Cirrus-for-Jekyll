# Work experience.
# Two supported structures:
#   1. Direct experience (context + responsibilities + tech)
#   2. Experience with sub-missions (missions[])
#
# Out of the box, the example logos are generated by https://ui-avatars.com
# from each company's initials (no asset to manage). Replace each `logo:`
# with the path to your real company logo once you have one.

# ── Example 1: direct experience ──────────────────────────────────────────────
- company: "Acme Corp"
  logo: "https://ui-avatars.com/api/?name=Acme+Corp&background=003b82&color=fff&bold=true&size=128"
  period: "2021 - Present"
  title: "Systems Administrator"
  description: >-
    Brief description of the company and your overall role there.
  context: >-
    Managed a hybrid infrastructure of 150 users across 3 sites.
  responsibilities:
    - category: "Active Directory & Identity"
      items:
        - "Managed user lifecycle and GPO policies"
        - "Implemented MFA and conditional access policies"
    - category: "Cloud & Collaboration"
      items:
        - "Migrated on-prem Exchange to Exchange Online"
        - "Administered Microsoft 365 licenses and security"
  tech: "Active Directory, Microsoft 365, PowerShell, Azure"

# ── Example 2: experience with missions (e.g. consulting) ─────────────────────
- company: "Consulting Firm"
  logo: "https://ui-avatars.com/api/?name=Consulting+Firm&background=2a6496&color=fff&bold=true&size=128"
  period: "2018 - 2021"
  title: "IT Consultant"
  description: >-
    Brief description of the consulting company and your role.
  missions:
    - client: "Big Bank"
      logo: "https://ui-avatars.com/api/?name=Big+Bank&background=7a2090&color=fff&bold=true&size=128"
      period: "2019 - 2021"
      context: >-
        Context of the mission: team size, scope, environment.
      responsibilities:
        - category: "Administration"
          items:
            - "Deployed and maintained the Active Directory infrastructure"
            - "Automated onboarding with PowerShell scripts"
      tech: "Active Directory, PowerShell, Windows Server 2019"
