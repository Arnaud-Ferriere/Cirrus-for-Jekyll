# Professional certifications.
# badge: path to a badge image in assets/ (or any URL).
# url: link to your public credential.
#
# Out of the box, the example badges are generated by https://ui-avatars.com
# from the certification's initials. Replace each `badge:` with the path to
# your real badge image once you have one.

- name: "Azure Administrator Associate"
  date: "March 2024"
